services:
  - type: web
    name: neural-cv
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/neuralcv.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: COHERE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
